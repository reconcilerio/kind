name: "install-kind"
description: "Installs kind"
inputs:
  version:
    description: kind version to install
    default: latest
    required: true
runs:
  using: "composite"
  steps:
  - name: Download kind
    id: download-kind
    run: |
      set -euo pipefail

      version="${{ inputs.version }}"
      os="$(go env GOOS)"
      arch="$(go env GOARCH)"

      if [[ "${version}" == "latest" ]]; then
        version=$(curl -s https://api.github.com/repos/kubernetes-sigs/kind/releases/latest | jq -r .tag_name)
      fi

      url="https://github.com/kubernetes-sigs/kind/releases/download/${version}/kind-${os}-${arch}"

      echo "Downloading ${url}"
      curl --fail -Lo kind "${url}"
      chmod +x kind
      mv kind /usr/local/bin
    shell: bash
    continue-on-error: true
  - name: Build kind, if unable to download
    if: steps.download-kind.outcome == 'failure'
    run: |
      set -euo pipefail

      go install sigs.kubernetes.io/kind@${{ inputs.version }}
      cp $(go env GOPATH)/bin/kind /usr/local/bin
    shell: bash
    env:
      GOTOOLCHAIN: auto
  - name: kind version
    run: |
      set -euo pipefail

      echo "installed to: $( which kind )"
      echo "kind version: $( kind --version )"
    shell: bash
