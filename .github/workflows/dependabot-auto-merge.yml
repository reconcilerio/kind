# derived from https://github.com/dependabot/fetch-metadata/tree/main#enabling-auto-merge
name: Dependabot auto-merge

on:
  push:
    branches:
    - 'dependabot/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.repository == 'reconcilerio/kind'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Set PR to auto-merge
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' && steps.metadata.outputs.dependency-name == 'k8s.io/kubectl'
        run: gh pr merge --auto --squash ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
