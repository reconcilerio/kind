name: Publish

on:
  push:
    branches:
    - '**'
    - '!dependabot/**'
    tags:
    # semver tags
    - 'v[0-9]+\.[0-9]+\.[0-9]+-?**'
  pull_request: {}

env:
  kind-version: v0.31.0
  kubernetes-version: v1.36.0

jobs:
  base:
    name: Base image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Install crane
      uses: ./.github/actions/install-crane

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check for existing base image
      id: base_image_check
      run: crane digest ghcr.io/${{ github.repository }}/base:${{ env.kind-version }}
      continue-on-error: true

    - name: Checkout kind ${{ env.kind-version }}
      if: steps.base_image_check.outcome == 'failure'
      uses: actions/checkout@v6
      with:
        repository: kubernetes-sigs/kind
        path: kind
        ref: ${{ env.kind-version }}
    - name: Build kind base image
      if: steps.base_image_check.outcome == 'failure'
      run: make push
      env:
        IMAGE: ghcr.io/${{ github.repository }}/base:${{ env.kind-version }}
      working-directory: kind/images/base

  node:
    name: Node image
    needs: base
    strategy:
      matrix:
        include:
        - arch: amd64
          os: ubuntu-24.04
        - arch: arm64
          os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Install crane
      uses: ./.github/actions/install-crane
    - name: Install kind
      uses: ./.github/actions/install-kind
      with:
        version: ${{ env.kind-version }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check for existing ${{ matrix.arch }} node image
      id: node_image_check
      run: crane digest ghcr.io/${{ github.repository }}/node:${{ env.kubernetes-version }}-${{ env.kind-version }}-${{ matrix.arch }}
      continue-on-error: true

    - name: Checkout kubernetes ${{ env.kubernetes-version }}
      if: steps.node_image_check.outcome == 'failure'
      uses: actions/checkout@v6
      with:
        repository: kubernetes/kubernetes
        path: kubernetes
        ref: ${{ env.kubernetes-version }}
    - name: Build kind ${{ matrix.arch }} node image
      if: steps.node_image_check.outcome == 'failure'
      run: |
        kind build node-image ./kubernetes \
          --arch ${{ matrix.arch }} \
          --base-image ghcr.io/${{ github.repository }}/base:${{ env.kind-version }} \
          --image ghcr.io/${{ github.repository }}/node:${{ env.kubernetes-version }}-${{ env.kind-version }}-${{ matrix.arch }} \
          --type release
        docker push ghcr.io/${{ github.repository }}/node:${{ env.kubernetes-version }}-${{ env.kind-version }}-${{ matrix.arch }}

  publish:
    name: Publish images
    needs: node
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Install crane
      uses: ./.github/actions/install-crane

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check for existing node image
      id: node_image_check
      run: crane digest ghcr.io/${{ github.repository }}/node:${{ env.kubernetes-version }}-${{ env.kind-version }}
      continue-on-error: true
    - name: Assemble kind node image
      if: steps.node_image_check.outcome == 'failure'
      run: |
        crane index append \
          -m ghcr.io/${{ github.repository }}/node:${{ env.kubernetes-version }}-${{ env.kind-version }}-amd64 \
          -m ghcr.io/${{ github.repository }}/node:${{ env.kubernetes-version }}-${{ env.kind-version }}-arm64 \
          -t ghcr.io/${{ github.repository }}/node:${{ env.kubernetes-version }}-${{ env.kind-version }}
    - name: Vanity tags
      if: steps.node_image_check.outcome == 'failure'
      run: |
        crane tag ghcr.io/${{ github.repository }}/node:${{ env.kubernetes-version }}-${{ env.kind-version }} ${{ env.kubernetes-version }}
        crane tag ghcr.io/${{ github.repository }}/node:${{ env.kubernetes-version }}-${{ env.kind-version }} $( ${kubernetes-version} | cut -d'.' -f1-2 )
