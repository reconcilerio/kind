name: Publish

on:
  workflow_dispatch:
    inputs: &workflow-inputs
      kind-version:
        description: kind version to use
        required: true
        type: string
      kubernetes-version:
        description: kubernetes version to use
        required: true
        type: string
      latest:
        description: tag this image as ':latest'
        type: boolean
        default: false
  workflow_call:
    inputs: *workflow-inputs

concurrency:
  group: publish
  queue: max

jobs:
  base:
    name: Build base image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Install crane
      uses: reconcilerio/install-crane-action@v1

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check for existing base image
      id: base_image_check
      run: crane digest ghcr.io/${{ github.repository }}/base:${{ inputs.kind-version }}
      continue-on-error: true

    - name: Checkout kind ${{ inputs.kind-version }}
      if: steps.base_image_check.outcome == 'failure'
      uses: actions/checkout@v6
      with:
        repository: kubernetes-sigs/kind
        path: kind
        ref: ${{ inputs.kind-version }}
    - name: Build kind base image
      if: steps.base_image_check.outcome == 'failure'
      run: make push
      env:
        IMAGE: ghcr.io/${{ github.repository }}/base:${{ inputs.kind-version }}
      working-directory: kind/images/base

  node:
    name: Build node image
    needs: base
    strategy:
      fail-fast: false
      matrix:
        include:
        - arch: amd64
          os: ubuntu-24.04
        - arch: arm64
          os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Install crane
      uses: reconcilerio/install-crane-action@v1
    - name: Install kind
      uses: reconcilerio/install-kind-action@v1
      with:
        version: ${{ inputs.kind-version }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check for existing ${{ matrix.arch }} node image
      id: node_image_check
      run: crane digest ghcr.io/${{ github.repository }}/node:${{ inputs.kubernetes-version }}-${{ inputs.kind-version }}-${{ matrix.arch }}
      continue-on-error: true

    - name: Checkout kubernetes ${{ inputs.kubernetes-version }}
      if: steps.node_image_check.outcome == 'failure'
      uses: actions/checkout@v6
      with:
        repository: kubernetes/kubernetes
        path: kubernetes
        ref: ${{ inputs.kubernetes-version }}
    - name: Build kind ${{ matrix.arch }} node image
      if: steps.node_image_check.outcome == 'failure'
      run: |
        kind build node-image ./kubernetes \
          --arch ${{ matrix.arch }} \
          --base-image ghcr.io/${{ github.repository }}/base:${{ inputs.kind-version }} \
          --image ghcr.io/${{ github.repository }}/node:${{ inputs.kubernetes-version }}-${{ inputs.kind-version }}-${{ matrix.arch }} \
          --type release
        docker push ghcr.io/${{ github.repository }}/node:${{ inputs.kubernetes-version }}-${{ inputs.kind-version }}-${{ matrix.arch }}

  assemble:
    name: Assemble images
    needs: node
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Install crane
      uses: reconcilerio/install-crane-action@v1

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Assemble node image index
      run: |
        crane index append \
          -m ghcr.io/${{ github.repository }}/node:${{ inputs.kubernetes-version }}-${{ inputs.kind-version }}-amd64 \
          -m ghcr.io/${{ github.repository }}/node:${{ inputs.kubernetes-version }}-${{ inputs.kind-version }}-arm64 \
          -t ghcr.io/${{ github.repository }}/node:${{ inputs.kubernetes-version }}-${{ inputs.kind-version }}
    - name: Vanity tags
      run: |
        crane tag ghcr.io/${{ github.repository }}/node:${{ inputs.kubernetes-version }}-${{ inputs.kind-version }} ${{ inputs.kubernetes-version }}
        crane tag ghcr.io/${{ github.repository }}/node:${{ inputs.kubernetes-version }}-${{ inputs.kind-version }} $( echo "${{ inputs.kubernetes-version }}" | cut -d'.' -f1-2 )
    - name: ":latest tag"
      if: inputs.latest
      run: |
        crane tag ghcr.io/${{ github.repository }}/node:${{ inputs.kubernetes-version }}-${{ inputs.kind-version }} latest
        