name: CI

on:
  push:
    branches:
    - '**'
  pull_request: {}

jobs:
  prep:
    name: Resolve versions to build
    runs-on: ubuntu-latest
    outputs:
      kind-version: ${{ steps.kind.outputs.version }}
      kubernetes-version: ${{ steps.kubernetes.outputs.version }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: stable
    - name: Resolve kind version
      id: kind
      run: echo "version=$(go list -modfile hack/kind/go.mod -m -f '{{.Version}}' sigs.k8s.io/kind)" | tee -a "$GITHUB_OUTPUT"
      env:
        GOTOOLCHAIN: auto
    - name: Resolve kubernetes version
      id: kubernetes
      run: echo "version=$(go list -modfile hack/kubernetes/go.mod -m -f '{{.Version}}' k8s.io/kubectl | sed s/^v0\./v1\./)" | tee -a "$GITHUB_OUTPUT"
      env:
        GOTOOLCHAIN: auto

  build:
    name: Build
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      packages: write
    needs: prep
    uses: ./.github/workflows/publish.yaml
    with:
      kind-version: ${{ needs.prep.outputs.kind-version }}
      kubernetes-version: ${{ needs.prep.outputs.kubernetes-version }}
    secrets: inherit

  test:
    name: Test
    needs: build
    if: needs.build.result == 'success' || needs.build.result == 'skipped'
    strategy:
      matrix:
        includes:
        - name: defaults
        - name: k8s v1.36
          with:
            kubernetes-version: v1.36
        - name: k8s v1.35
          with:
            kubernetes-version: v1.35
        - name: k8s v1.34
          with:
            kubernetes-version: v1.34
        - name: k8s v1.33
          with:
           kubernetes-version: v1.33
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: KinD cluster
      uses: ./
      with: ${{ matrix.with || fromJSON('{}') }}
    - name: Cluster info
      run: |
        set -euo pipefail

        echo "##[group]kubectl cluster-info"
          kubectl cluster-info
        echo "##[endgroup]"
        echo "##[group]kubectl api-resources"
          kubectl api-resources
        echo "##[endgroup]"
        echo "##[group]kubectl get nodes"
          kubectl get nodes
        echo "##[endgroup]"
        echo "##[group]kubectl describe nodes"
          kubectl describe nodes
        echo "##[endgroup]"
