name: Pull request

on:
  pull_request: {}

jobs:

  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      kind-version: ${{ steps.kind.outputs.version }}
      kubernetes: ${{ steps.kubernetes.outputs.version }}
      kubernetes-changed: ${{ steps.filter.outputs['kubernetes'] }}
      kubernetes-1.37: ${{ steps.kubernetes.outputs['1.37'] }}
      kubernetes-1.37-changed: ${{ steps.filter.outputs['kubernetes-1.37'] }}
      kubernetes-1.36: ${{ steps.kubernetes.outputs['1.36'] }}
      kubernetes-1.36-changed: ${{ steps.filter.outputs['kubernetes-1.36'] }}
      kubernetes-1.35: ${{ steps.kubernetes.outputs['1.35'] }}
      kubernetes-1.35-changed: ${{ steps.filter.outputs['kubernetes-1.35'] }}
      kubernetes-1.34: ${{ steps.kubernetes.outputs['1.34'] }}
      kubernetes-1.34-changed: ${{ steps.filter.outputs['kubernetes-1.34'] }}
      kubernetes-1.33: ${{ steps.kubernetes.outputs['1.33'] }}
      kubernetes-1.33-changed: ${{ steps.filter.outputs['kubernetes-1.33'] }}
      kubernetes-1.32: ${{ steps.kubernetes.outputs['1.32'] }}
      kubernetes-1.32-changed: ${{ steps.filter.outputs['kubernetes-1.32'] }}
      kubernetes-1.31: ${{ steps.kubernetes.outputs['1.31'] }}
      kubernetes-1.31-changed: ${{ steps.filter.outputs['kubernetes-1.31'] }}
      kubernetes-1.30: ${{ steps.kubernetes.outputs['1.30'] }}
      kubernetes-1.30-changed: ${{ steps.filter.outputs['kubernetes-1.30'] }}
      kubernetes-1.29: ${{ steps.kubernetes.outputs['1.29'] }}
      kubernetes-1.29-changed: ${{ steps.filter.outputs['kubernetes-1.29'] }}
      kubernetes-1.28: ${{ steps.kubernetes.outputs['1.28'] }}
      kubernetes-1.28-changed: ${{ steps.filter.outputs['kubernetes-1.28'] }}
      kubernetes-1.27: ${{ steps.kubernetes.outputs['1.27'] }}
      kubernetes-1.27-changed: ${{ steps.filter.outputs['kubernetes-1.27'] }}
      kubernetes-1.26: ${{ steps.kubernetes.outputs['1.26'] }}
      kubernetes-1.26-changed: ${{ steps.filter.outputs['kubernetes-1.26'] }}
      kubernetes-1.25: ${{ steps.kubernetes.outputs['1.25'] }}
      kubernetes-1.25-changed: ${{ steps.filter.outputs['kubernetes-1.25'] }}
      kubernetes-1.24: ${{ steps.kubernetes.outputs['1.24'] }}
      kubernetes-1.24-changed: ${{ steps.filter.outputs['kubernetes-1.24'] }}
      kubernetes-1.23: ${{ steps.kubernetes.outputs['1.23'] }}
      kubernetes-1.23-changed: ${{ steps.filter.outputs['kubernetes-1.23'] }}
      commons-changed: ${{ steps.filter.outputs.commons }}
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version: stable
    - uses: dorny/paths-filter@v4
      id: filter
      with:
        filters: |
          commons:
          - '.github/**'
          - 'action.yml'
          - 'logs/action.yml'
          - 'versions/cloud-provider-kind/**'
          - 'versions/kind/**'
          kubernetes:
          - 'versions/kubernetes/default/**'
          kubernetes-1.37:
          - 'versions/kubernetes/v1.37/**'
          kubernetes-1.36:
          - 'versions/kubernetes/v1.36/**'
          kubernetes-1.35:
          - 'versions/kubernetes/v1.35/**'
          kubernetes-1.34:
          - 'versions/kubernetes/v1.34/**'
          kubernetes-1.33:
          - 'versions/kubernetes/v1.33/**'
          kubernetes-1.32:
          - 'versions/kubernetes/v1.32/**'
          kubernetes-1.31:
          - 'versions/kubernetes/v1.31/**'
          kubernetes-1.30:
          - 'versions/kubernetes/v1.30/**'
          kubernetes-1.29:
          - 'versions/kubernetes/v1.29/**'
          kubernetes-1.28:
          - 'versions/kubernetes/v1.28/**'
          kubernetes-1.27:
          - 'versions/kubernetes/v1.27/**'
          kubernetes-1.26:
          - 'versions/kubernetes/v1.26/**'
          kubernetes-1.25:
          - 'versions/kubernetes/v1.25/**'
          kubernetes-1.24:
          - 'versions/kubernetes/v1.24/**'
          kubernetes-1.23:
          - 'versions/kubernetes/v1.23/**'
    - name: Resolve kind version
      id: kind
      run: echo "version=$(go list -modfile versions/kind/go.mod -m -f '{{.Version}}' sigs.k8s.io/kind)" | tee -a "${GITHUB_OUTPUT}"
      env:
        GOTOOLCHAIN: auto
    - name: Resolve kubernetes version
      id: kubernetes
      run: |
        set -euo pipefail

        echo "version=$(go list -modfile versions/kubernetes/default/go.mod -m -f '{{.Version}}' k8s.io/kubectl | sed s/^v0\./v1\./)" | tee -a "${GITHUB_OUTPUT}"
        for minor in {23..37}; do
          echo "1.${minor}=$(go list -modfile versions/kubernetes/v1.${minor}/go.mod -m -f '{{.Version}}' k8s.io/kubectl | sed s/^v0\./v1\./)" | tee -a "${GITHUB_OUTPUT}"
        done
      env:
        GOTOOLCHAIN: auto

  base:
    name: Base image ${{ needs.preflight.outputs.kind-version }}
    needs: preflight
    permissions:
      packages: write
      id-token: write
    uses: ./.github/workflows/image-base.yaml
    with:
      kind-version: ${{ needs.preflight.outputs.kind-version }}
      tag: ${{ needs.preflight.outputs.kind-version }}
      publish: false
      force: ${{ needs.preflight.outputs.commons-changed == 'true' }}
    secrets: inherit

  node:
    name: Node image ${{ matrix.kubernetes-version }}
    permissions:
      # called workflow requires write even though it's never used from here
      packages: write
      id-token: write
    needs: [base, preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
        - tag: ${{ needs.preflight.outputs['kubernetes'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes'] }}
          force: ${{ needs.preflight.outputs['kubernetes-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.37'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.37'] }}
          force: ${{ needs.preflight.outputs['kubernetes-1.37-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.36'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.36'] }}
          force: ${{ needs.preflight.outputs['kubernetes-1.36-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.35'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.35'] }}
          force: ${{ needs.preflight.outputs['kubernetes-1.35-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.34'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.34'] }}
          force: ${{ needs.preflight.outputs['kubernetes-1.34-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.33'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.33'] }}
          force: ${{ needs.preflight.outputs['kubernetes-1.33-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.32'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.32'] }}
          force: ${{ needs.preflight.outputs['kubernetes-1.32-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.31'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.31'] }}
          force: ${{ needs.preflight.outputs['kubernetes-1.31-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.30'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.30'] }}
          cloud-provider-kind-version: v0.10.0
          force: ${{ needs.preflight.outputs['kubernetes-1.30-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.29'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.29'] }}
          cloud-provider-kind-version: v0.10.0
          force: ${{ needs.preflight.outputs['kubernetes-1.29-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.28'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.28'] }}
          cloud-provider-kind-version: v0.10.0
          force: ${{ needs.preflight.outputs['kubernetes-1.28-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.27'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.27'] }}
          cloud-provider-kind-version: v0.10.0
          force: ${{ needs.preflight.outputs['kubernetes-1.27-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.26'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.26'] }}
          cloud-provider-kind-version: v0.10.0
          force: ${{ needs.preflight.outputs['kubernetes-1.26-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.25'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.25'] }}
          cloud-provider-kind-version: v0.10.0
          force: ${{ needs.preflight.outputs['kubernetes-1.25-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.24'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.24'] }}
          cloud-provider-kind-version: v0.10.0
          force: ${{ needs.preflight.outputs['kubernetes-1.24-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
        - tag: ${{ needs.preflight.outputs['kubernetes-1.23'] }}-${{ needs.preflight.outputs.kind-version}}
          kubernetes-version: ${{ needs.preflight.outputs['kubernetes-1.23'] }}
          cloud-provider-kind-version: v0.10.0
          force: ${{ needs.preflight.outputs['kubernetes-1.23-changed'] == 'true' || needs.preflight.outputs.commons-changed == 'true' }}
    uses: ./.github/workflows/image-node.yaml
    with:
      kind-version: "${{ needs.preflight.outputs.kind-version }}"
      kind-base-artifact-name: "${{ needs.base.outputs.artifact-name }}"
      kind-base-digest: "${{ needs.base.outputs.digest }}"
      kubernetes-version: "${{ matrix.kubernetes-version }}"
      cloud-provider-kind-version: "${{ matrix.cloud-provider-kind-version || 'auto' }}"
      tag: "${{ matrix.tag }}"
      publish: false
      force: ${{ matrix.force }}
      id: "${{ strategy.job-index }}"
    secrets: inherit

  done:
    # used as a non-matrix job for protected branches
    name: Done
    needs: node
    runs-on: ubuntu-latest
    steps:
    - run: echo "That's all folks"
